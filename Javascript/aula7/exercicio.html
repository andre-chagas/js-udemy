<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios</title>
</head>
<body>
    
    <script>
        const nome = prompt('Digite seu nome completo');
        document.body.innerHTML += `Seu nome é: <strong>${nome}</strong><br />`;
        document.body.innerHTML += `Seu nome tem ${nome.length} letras<br />`;
        document.body.innerHTML += `A segunda letra do seu nome é: ${nome[1]}<br />`;
        document.body.innerHTML += `Qual p primeiro índicie da a no seu nome? ${nome.indexOf('a')} <br />`;
        document.body.innerHTML += `Qual o último índicie da letra a no seu nome? ${nome.lastIndexOf('a')}<br />`;
        document.body.innerHTML += `As últimas 3 letras do seu nome são: ${nome.slice(-3, nome.length)}<br />`;
        document.body.innerHTML += `As palavras do seu nome são: ${nome.slipt(' ')}<br />`;
        document.body.innerHTML += `Seu nome com letras maiúsculas: ${nome.toUpperCase()}<br />`;
        document.body.innerHTML += `Seu nome com letras munúsculas: ${nome.toLowerCase()}<br />`;
    </script>

</body>
</html>
